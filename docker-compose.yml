name: soa-hw6

services:
  kafka:
    image: confluentinc/cp-kafka:7.9.1
    hostname: kafka
    container_name: soa-hw6-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  schema-registry:
    image: confluentinc/cp-schema-registry:7.9.1
    hostname: schema-registry
    container_name: soa-hw6-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: BACKWARD
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka-init:
    image: confluentinc/cp-kafka:7.9.1
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic warehouse-events --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic warehouse-events-dlq --partitions 3 --replication-factor 1
      "

  schema-registry-init:
    image: python:3.12-alpine
    depends_on:
      schema-registry:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
      - ./scripts:/scripts:ro
    command: python3 /scripts/register_v1_schema.py

  cassandra-1:
    image: cassandra:5.0
    container_name: soa-hw6-cassandra-1
    hostname: cassandra-1
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: warehouse-cluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-1
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20

  cassandra-2:
    image: cassandra:5.0
    container_name: soa-hw6-cassandra-2
    hostname: cassandra-2
    depends_on:
      cassandra-1:
        condition: service_started
    environment:
      CASSANDRA_CLUSTER_NAME: warehouse-cluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-1
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20

  cassandra-3:
    image: cassandra:5.0
    container_name: soa-hw6-cassandra-3
    hostname: cassandra-3
    depends_on:
      cassandra-2:
        condition: service_healthy
    environment:
      CASSANDRA_CLUSTER_NAME: warehouse-cluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-1
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20

  cassandra-init:
    image: cassandra:5.0
    depends_on:
      cassandra-1:
        condition: service_healthy
      cassandra-2:
        condition: service_healthy
      cassandra-3:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command: >
      bash -c "
      for file in /migrations/*.cql; do
        echo applying $$file;
        cqlsh cassandra-1 9042 -f $$file;
      done
      "

  warehouse-consumer:
    container_name: soa-hw6-warehouse-consumer
    build:
      context: .
      args:
        SERVICE: warehouse-consumer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-registry-init:
        condition: service_completed_successfully
      cassandra-init:
        condition: service_completed_successfully
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CASSANDRA_HOSTS: cassandra-1:9042,cassandra-2:9042,cassandra-3:9042
      CASSANDRA_DC: datacenter1
      HTTP_ADDR: :8080

  wms-producer:
    build:
      context: .
      args:
        SERVICE: wms-producer
    profiles: ["tools"]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081

  prometheus:
    container_name: soa-hw6-prometheus
    image: prom/prometheus:v3.3.0
    depends_on:
      - warehouse-consumer
      - kafka-exporter
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro

  kafka-exporter:
    container_name: soa-hw6-kafka-exporter
    image: danielqsj/kafka-exporter:v1.9.0
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - --kafka.server=kafka:9092
      - --topic.filter=^warehouse-events$
      - --group.filter=^warehouse-state-consumer$
    ports:
      - "9308:9308"

  grafana:
    container_name: soa-hw6-grafana
    image: grafana/grafana:11.6.1
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
