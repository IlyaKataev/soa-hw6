global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: warehouse-consumer
    static_configs:
      - targets: ["warehouse-consumer:8080"]

  - job_name: kafka-exporter
    static_configs:
      - targets: ["kafka-exporter:9308"]
